# Nginx config snippet for Asistencia
# Ubicar en: /etc/nginx/sites-available/asistencia

server {
    listen 80;
    server_name portal.claro.com.ni;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.claro.com.ni;

    ssl_certificate /etc/ssl/certs/claro.crt;
    ssl_certificate_key /etc/ssl/private/claro.key;

    root /var/www/asistencia/dist;
    index index.html;

    location /asistencia/ {
        alias /var/www/asistencia/dist/;
        try_files $uri $uri/ /asistencia/index.html;
    }

    location /api-asistencia/ {
        rewrite ^/api-asistencia/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /asistencia-uploads/ {
        alias /opt/apps/asistencia/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
